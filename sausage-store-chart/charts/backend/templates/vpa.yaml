{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: sausage-backend-vpa
  namespace: {{ .Release.Namespace }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sausage-backend
  updatePolicy:
    updateMode: "{{ .Values.vpa.updateMode }}"
{{- end }}
