apiVersion: v1
kind: Service
metadata:
  name: sausage-backend-report
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sausage-backend-report
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
